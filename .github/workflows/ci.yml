name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Create venv and install deps
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run pytest
        run: .venv/bin/python -m pytest tests/ -v

  ts-tests:
    name: TypeScript / Next.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Run tests (if script exists)
        run: |
          if npm run | grep -qE '^  test$'; then
            npm test
          else
            echo "No 'test' script in package.json — skipping."
          fi

      - name: TypeScript type-check
        run: npx tsc --noEmit

  bridge-roundtrip:
    name: TS → Python envelope round-trip
    runs-on: ubuntu-latest
    needs: [python-tests, ts-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Python deps
        run: |
          pip install uv
          uv venv
          uv pip install -e ".[dev]"

      - name: Install npm deps
        run: npm ci

      - name: Run make test-bridge
        run: make test-bridge

  lint:
    name: Lint (best-effort)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python deps (for ruff)
        run: |
          pip install uv
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff (if available)
        run: |
          if [ -x .venv/bin/ruff ]; then
            .venv/bin/python -m ruff check .
          else
            echo "ruff not installed — skipping."
          fi

      - name: Prettier (if available)
        run: |
          if npx --no-install prettier --version >/dev/null 2>&1; then
            npx prettier --check .
          else
            echo "prettier not installed — skipping."
          fi
